name: Revisie controle

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write

env:
  ORG: IDgis
  TARGET_PROJECT: "15"
  EXPIRED_LABEL: "revisie-verlopen"

jobs:
  revisie-check:
    runs-on: ubuntu-latest

    steps:
      - name: Controleer revisiedatums
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail

          TODAY=$(date +%Y-%m-%d)

          ####################################
          # Projectgegevens ophalen
          ####################################

          PROJECT_INFO=$(gh api graphql -f query='
          query($org:String!, $number:Int!) {
            organization(login:$org) {
              projectV2(number:$number) {
                id
                field(name:"Status") {
                  ... on ProjectV2SingleSelectField {
                    id
                    options {
                      id
                      name
                    }
                  }
                }
              }
            }
          }' \
          -F org="$ORG" \
          -F number="$TARGET_PROJECT")

          PROJECT_ID=$(echo "$PROJECT_INFO" | jq -r '.data.organization.projectV2.id')

          STATUS_FIELD_ID=$(echo "$PROJECT_INFO" | jq -r '.data.organization.projectV2.field.id')

          READY_OPTION_ID=$(echo "$PROJECT_INFO" \
            | jq -r '.data.organization.projectV2.field.options[]
                | select(.name=="Ready")
                | .id')

          ####################################
          # Open issues ophalen
          ####################################

          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "Revisie:" \
            --limit 1000 \
            --json number,body,labels \
            > issues.json

          ####################################
          # Issues controleren
          ####################################

          while IFS= read -r ISSUE
          do
            NUMBER=$(echo "$ISSUE" | jq -r '.number')
            BODY=$(echo "$ISSUE" | jq -r '.body // ""')

            if [[ "$BODY" =~ Revisie:[[:space:]]*([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
              REV_DATE="${BASH_REMATCH[1]}"
            else
              continue
            fi

            echo "Issue #$NUMBER revisie: $REV_DATE"

            if [[ "$REV_DATE" > "$TODAY" ]]; then
              echo "Nog niet verlopen."
              continue
            fi

            echo "Revisie verlopen."

            ####################################
            # Label toevoegen
            ####################################

            gh issue edit "$NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --add-label "$EXPIRED_LABEL"

            ####################################
            # Project item zoeken
            ####################################

            ITEM_ID=$(gh api graphql -f query='
            query($org:String!, $number:Int!, $issue:Int!) {
              organization(login:$org) {
                projectV2(number:$number) {
                  items(first:100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' \
            -F org="$ORG" \
            -F number="$TARGET_PROJECT" \
            -F issue="$NUMBER" \
            --jq '.data.organization.projectV2.items.nodes[]
                  | select(.content.number=='"$NUMBER"')
                  | .id')

            if [ -z "$ITEM_ID" ]; then
              echo "Issue staat niet op project."
              continue
            fi

            ####################################
            # Status -> Ready
            ####################################

            gh api graphql -f query='
            mutation(
              $project:ID!,
              $item:ID!,
              $field:ID!,
              $option:String!
            ){
              updateProjectV2ItemFieldValue(
                input:{
                  projectId:$project
                  itemId:$item
                  fieldId:$field
                  value:{
                    singleSelectOptionId:$option
                  }
                }
              ){
                projectV2Item {
                  id
                }
              }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID" \
            -f field="$STATUS_FIELD_ID" \
            -f option="$READY_OPTION_ID"

            echo "Issue #$NUMBER bijgewerkt."

          done < <(jq -c '.[]' issues.json)

          echo "Workflow succesvol afgerond."
