name: Revisie controle

on:
  schedule:
    - cron: "0 6 1 * *"   # elke 1e van de maand om 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

env:
  ORG: IDgis
  
  # nieuwe projectbord
  TARGET_PROJECT: "15"
  
  EXPIRED_LABEL: "revisie-verlopen"

jobs:
  revisie-check:
    runs-on: ubuntu-latest

    steps:
      - name: Controleer revisiedatums en maak vervolgissues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        shell: bash
        run: |

          set -euxo pipefail

          TODAY=$(date +%Y-%m-%d)

          echo "Vandaag: $TODAY"


          ####################################
          # Project ID ophalen
          ####################################

          TARGET_PROJECT_ID=$(gh api graphql \
            -f query='
            query($org:String!, $number:Int!) {
              organization(login:$org) {
                projectV2(number:$number) {
                  id
                  title
                }
              }
            }' \
            -F org="$ORG" \
            -F number="$TARGET_PROJECT" \
            --jq '.data.organization.projectV2.id')

          echo "Target project ID: $TARGET_PROJECT_ID"


          ####################################
          # Alleen open issues met Revisie ophalen
          ####################################

          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "Revisie:" \
            --limit 1000 \
            --json number,title,body \
            > issues.json


          ####################################
          # Issues controleren
          ####################################

          while IFS= read -r ISSUE
          do

            NUMBER=$(echo "$ISSUE" | jq -r '.number')
            TITLE=$(echo "$ISSUE" | jq -r '.title')
            BODY=$(echo "$ISSUE" | jq -r '.body // ""')


            ####################################
            # Bestaande vervolgissues overslaan
            ####################################

            if [[ "$BODY" =~ Is\ vervolg\ van\ #[0-9]+ ]]; then
              echo "Issue #$NUMBER is een vervolgissue, overslaan"
              continue
            fi


            ####################################
            # Revisiedatum uitlezen
            ####################################

            if [[ "$BODY" =~ Revisie:[[:space:]]*([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
              REV_DATE="${BASH_REMATCH[1]}"
            else
              echo "Geen revisiedatum gevonden in issue #$NUMBER"
              continue
            fi


            echo "Issue #$NUMBER revisie $REV_DATE"


            ####################################
            # Controleren of revisie verlopen is
            ####################################

            if [[ "$REV_DATE" > "$TODAY" ]]; then
              echo "Nog niet verlopen"
              continue
            fi


            echo "Revisie verlopen voor issue #$NUMBER"


            ####################################
            # Nieuw issue maken
            ####################################

            NEW_BODY="Is vervolg van #$NUMBER"


            NEW_URL=$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$NEW_BODY" \
              --label "$EXPIRED_LABEL")


            NEW_NUMBER=$(echo "$NEW_URL" | grep -oE '[0-9]+$')

            echo "Nieuw issue: #$NEW_NUMBER"


            ####################################
            # Verwijzing toevoegen aan oud issue
            ####################################

            gh issue comment "$NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body \
            "Nieuwe revisie aangemaakt. Vervolg issue: #$NEW_NUMBER"


            ####################################
            # Nieuw issue naar project backlog
            ####################################

            echo "Toevoegen aan project $TARGET_PROJECT"


            ISSUE_ID=$(gh issue view "$NEW_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json id \
              -q .id)


            ITEM_ID=$(gh api graphql \
              -f query='
              mutation($project:ID!, $content:ID!) {
                addProjectV2ItemById(
                  input:{
                    projectId:$project,
                    contentId:$content
                  }
                ){
                  item {
                    id
                  }
                }
              }' \
              -f project="$TARGET_PROJECT_ID" \
              -f content="$ISSUE_ID" \
              --jq '.data.addProjectV2ItemById.item.id')


            if [ -z "$ITEM_ID" ]; then
              echo "Issue kon niet aan project worden toegevoegd"
              exit 1
            fi
            
            echo "Project item: $ITEM_ID"


            ####################################
            # Oud issue sluiten
            ####################################

            gh issue close "$NUMBER" \
              --repo "$GITHUB_REPOSITORY"


            echo "Issue #$NUMBER succesvol afgerond."

          done < <(jq -c '.[]' issues.json)


          echo "Workflow succesvol afgerond."
